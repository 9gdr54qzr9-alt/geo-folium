function normalizeText(text) {
    return String(text)
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/ς/g, "σ")
        .replace(/[^a-zα-ω0-9 ]/g, " ")
        .replace(/\s+/g, " ")

}
function escapeText(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}
function distanceKm(lat1, lon1, lat2, lon2) {
    var R = 6371;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
}

            "<div class='result-address'>📍 " + escapeText(result.address) + "</div>";
        if (showDistance) {
            html += "<div class='result-distance'>" + result.distance.toFixed(2) + " km μακριά</div>";
        }
        html += "</div>";
    });
    resultsDiv.innerHTML = html;
}
function zoomToResults(results) {
    var bounds = results.map(function(result) {
        return [result.lat, result.lon];
    });
    if (bounds.length === 1) {
        map_c904a1c4d2da93d0bac87b09593f640b.setView(bounds[0], 16);
    } else {
        map_c904a1c4d2da93d0bac87b09593f640b.fitBounds(bounds);
    }
}
function searchStore() {
    var q = document.getElementById("storeSearchInput").value;
    var query = normalizeText(q);
    if (!query) {
        document.getElementById("searchResults").innerHTML =
            "<div class='error-msg'>Γράψε όνομα ή διεύθυνση.</div>";
        return;
    }
    var results = stores
        .map(function(s, index) {
            return {
                index: index,
                name: s.name,
                address: s.address,
                lat: s.lat,
                lon: s.lon
            };
        })
        .filter(function(s) {
            return normalizeText(s.name).includes(query) ||
                   normalizeText(s.address).includes(query);
        });
    if (results.length > 0) {
        renderResults(results, "Βρέθηκαν " + results.length + " αποτελέσματα", false);
        zoomToResults(results);
    } else {
        document.getElementById("searchResults").innerHTML =
            "<div class='error-msg'>Δεν βρέθηκε: " + escapeText(q) + "</div>";
    }
}
function findNearestStores() {
    var resultsDiv = document.getElementById("searchResults");
    if (!navigator.geolocation) {
        resultsDiv.innerHTML = "<div class='error-msg'>Ο browser δεν υποστηρίζει τοποθεσία.</div>";
        return;
    }
    resultsDiv.innerHTML = "<div class='result-count'>Ζητείται πρόσβαση στην τοποθεσία...</div>";
    navigator.geolocation.getCurrentPosition(function(position) {
        var userLat = position.coords.latitude;
        var userLon = position.coords.longitude;
        if (userLocationMarker !== null) {
            map_c904a1c4d2da93d0bac87b09593f640b.removeLayer(userLocationMarker);
        }
        userLocationMarker = L.marker([userLat, userLon])
            .addTo(map_c904a1c4d2da93d0bac87b09593f640b)
            .bindPopup("<b>Η τοποθεσία σου</b>")
            .openPopup();
        var nearest = stores
            .map(function(s, index) {
                return {
                    index: index,
                    name: s.name,
                    address: s.address,
                    lat: s.lat,
                    lon: s.lon,
                    distance: distanceKm(userLat, userLon, s.lat, s.lon)
                };
            })
            .sort(function(a, b) {
                return a.distance - b.distance;
            })
            .slice(0, 5);
        renderResults(nearest, "Κοντινότερα 5 καταστήματα", true);
        var bounds = nearest.map(function(result) {
            return [result.lat, result.lon];
        });
        bounds.push([userLat, userLon]);
        map_c904a1c4d2da93d0bac87b09593f640b.fitBounds(bounds);
    }, function(error) {
        console.log(error);
        resultsDiv.innerHTML =
            "<div class='error-msg'>Error code: " +
            error.code +
            "<br>" +
            error.message +
            "</div>";
    });
}
document.getElementById("storeSearchInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        searchStore();
    }
});
